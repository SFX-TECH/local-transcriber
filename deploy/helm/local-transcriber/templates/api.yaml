apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lt.api.fullname" . }}
  labels:
    {{- include "lt.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "lt.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "uvicorn", "service.api:app",
                    "--host", "0.0.0.0", "--port", "{{ .Values.api.port }}"]
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          env:
            {{- include "lt.commonEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - name: data
              mountPath: {{ .Values.env.sharedDir }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "lt.fullname" . }}-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lt.api.fullname" . }}
  labels:
    {{- include "lt.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
{{- if .Values.api.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "lt.api.fullname" . }}
  labels:
    {{- include "lt.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  {{- with .Values.api.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.api.ingress.className }}
  ingressClassName: {{ .Values.api.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.api.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "lt.api.fullname" . }}
                port:
                  number: {{ .Values.api.service.port }}
{{- end }}
