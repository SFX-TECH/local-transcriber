name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    name: smoke test (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (CPU only)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cpu.txt

      # Runs the real pipeline on a 4s synthesized clip with the tiny model.
      # The tiny model is fetched once from Hugging Face on the runner; no
      # secrets and no user data are involved. If ffmpeg lacks the flite voice,
      # the test falls back to a tone clip and still verifies the pipeline.
      - name: Run smoke test
        env:
          SMOKE_MODEL: tiny
          HF_HUB_DISABLE_TELEMETRY: "1"
        run: python test_smoke.py

  service-test:
    name: service unit tests (queue + worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (CPU + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cpu.txt -r requirements-dev.txt

      # Drives the Redis queue with fakeredis and runs the worker on a tiny
      # synthesized clip; no real Redis and no user data.
      - name: Run service tests
        env:
          HF_HUB_DISABLE_TELEMETRY: "1"
        run: pytest tests/ -v

  helm-lint:
    name: helm lint (chart)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Lint chart
        run: helm lint deploy/helm/local-transcriber

      # Render templates for both the CPU and GPU paths to catch template errors.
      - name: Render templates (CPU)
        run: helm template lt deploy/helm/local-transcriber > /dev/null

      - name: Render templates (GPU path)
        run: helm template lt deploy/helm/local-transcriber --set worker.gpu.enabled=true > /dev/null
